<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel admina - Anto FC</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#120024,#1b0033,#050510);
    color:white;
    text-align:center;
}

header{
    padding:25px;
    font-size:32px;
    font-weight:bold;
}

.card{
    background:rgba(255,255,255,0.08);
    border-radius:22px;
    padding:20px;
    margin:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.35);
}

input, select{
    width:90%;
    max-width:420px;
    padding:13px;
    margin:9px;
    border-radius:12px;
    border:none;
    font-size:16px;
}

button{
    background:#ff7b00;
    color:white;
    border:none;
    padding:13px 22px;
    border-radius:15px;
    margin:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ff9500;
}

.status{
    margin-top:15px;
    color:#00d9ff;
    font-weight:bold;
}

.match-row{
    background:rgba(0,0,0,0.3);
    border-radius:15px;
    padding:12px;
    margin:10px auto;
    max-width:500px;
}
</style>
</head>

<body>

<header>🛠️ Panel admina Anto FC</header>

<div class="card">
    <h2>⚔️ Następny mecz</h2>

    <select id="next-competition">
        <option>RL Ekstraklasa</option>
        <option>Puchar Polski</option>
        <option>Liga Konferencji</option>
        <option>Liga Europy</option>
        <option>Liga Mistrzów</option>
    </select>

    <input id="next-home" placeholder="Gospodarz">
    <input id="next-away" placeholder="Goście">
    <input id="next-date" placeholder="Data/godzina, np. Sobota 19:00">
    <input id="next-status" placeholder="Status, np. Nadchodzący mecz">

    <br>
    <button onclick="saveNextMatch()">Zapisz następny mecz</button>
    <p id="next-status-info" class="status"></p>
</div>

<div class="card">
    <h2>📋 Dodaj ostatni mecz</h2>

    <select id="last-competition">
        <option>RL Ekstraklasa</option>
        <option>Puchar Polski</option>
        <option>Liga Konferencji</option>
        <option>Liga Europy</option>
        <option>Liga Mistrzów</option>
    </select>

    <input id="last-home" placeholder="Gospodarz">
    <input id="last-away" placeholder="Goście">
    <input id="last-home-score" type="number" placeholder="Gole gospodarza">
    <input id="last-away-score" type="number" placeholder="Gole gości">

    <select id="last-result">
        <option value="W">W - wygrana Anto FC</option>
        <option value="D">D - remis</option>
        <option value="L">L - porażka Anto FC</option>
    </select>

    <br>
    <button onclick="addLastMatch()">Dodaj mecz</button>
    <button onclick="clearLastMatches()">Wyczyść ostatnie mecze</button>

    <p id="last-status-info" class="status"></p>
</div>

<div class="card">
    <h2>🕘 Aktualne 5 ostatnich meczów</h2>
    <div id="last-matches-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://vunmvvamkcvjiolzxlny.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1bm12dmFta2N2amlvbHp4bG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzIyMTgsImV4cCI6MjA5NDY0ODIxOH0.exsfAN_sKGVxpI6sKJuAmYi6N1NyyJkFztvHUrdXVSU";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadNextMatch(){
    const { data, error } = await supabaseClient
        .from("next_match")
        .select("*")
        .eq("id", 1)
        .single();

    if(error){
        document.getElementById("next-status-info").innerText = "Błąd pobierania następnego meczu";
        console.log(error);
        return;
    }

    document.getElementById("next-competition").value = data.competition;
    document.getElementById("next-home").value = data.home_team;
    document.getElementById("next-away").value = data.away_team;
    document.getElementById("next-date").value = data.match_date || "";
    document.getElementById("next-status").value = data.status || "";
}

async function saveNextMatch(){
    const { error } = await supabaseClient
        .from("next_match")
        .update({
            competition: document.getElementById("next-competition").value,
            home_team: document.getElementById("next-home").value,
            away_team: document.getElementById("next-away").value,
            match_date: document.getElementById("next-date").value,
            status: document.getElementById("next-status").value
        })
        .eq("id", 1);

    if(error){
        document.getElementById("next-status-info").innerText = "Błąd zapisu";
        console.log(error);
        return;
    }

    document.getElementById("next-status-info").innerText = "Zapisano następny mecz!";
}

async function addLastMatch(){
    const { error } = await supabaseClient
        .from("last_matches")
        .insert({
            competition: document.getElementById("last-competition").value,
            home_team: document.getElementById("last-home").value,
            away_team: document.getElementById("last-away").value,
            home_score: Number(document.getElementById("last-home-score").value),
            away_score: Number(document.getElementById("last-away-score").value),
            result: document.getElementById("last-result").value
        });

    if(error){
        document.getElementById("last-status-info").innerText = "Błąd dodawania meczu";
        console.log(error);
        return;
    }

    document.getElementById("last-status-info").innerText = "Dodano mecz!";
    loadLastMatches();
}

async function clearLastMatches(){
    const confirmClear = confirm("Na pewno usunąć wszystkie ostatnie mecze?");
    if(!confirmClear) return;

    const { error } = await supabaseClient
        .from("last_matches")
        .delete()
        .neq("id", 0);

    if(error){
        document.getElementById("last-status-info").innerText = "Błąd czyszczenia";
        console.log(error);
        return;
    }

    document.getElementById("last-status-info").innerText = "Wyczyszczono mecze";
    loadLastMatches();
}

async function loadLastMatches(){
    const { data, error } = await supabaseClient
        .from("last_matches")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(5);

    if(error){
        console.log(error);
        return;
    }

    const list = document.getElementById("last-matches-list");
    list.innerHTML = "";

    data.forEach(match => {
        const div = document.createElement("div");
        div.className = "match-row";
        div.innerHTML = `
            <b>${match.competition}</b><br>
            ${match.home_team} ${match.home_score} - ${match.away_score} ${match.away_team}
            <br>
            Wynik Anto FC: ${match.result}
        `;
        list.appendChild(div);
    });
}

loadNextMatch();
loadLastMatches();
</script>

</body>
</html>
